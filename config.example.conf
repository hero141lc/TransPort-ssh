# 服务器连接配置
# 复制本文件为 config.conf 后，按实际信息修改
REMOTE_USER="your_user"
REMOTE_HOST="example.com"
REMOTE_SSH_PORT=22
SSH_PASSWORD="your_password"

# 多服务器配置（推荐）
# 格式: "名称|备注|用户|主机|SSH端口|密码"
SERVERS=(
  "开发环境|日常开发调试|dev_user|dev.example.com|22|dev_password"
  "测试环境|联调验证环境|qa_user|qa.example.com|22|qa_password"
  "生产环境|线上正式环境|prod_user|prod.example.com|22|prod_password"
)
DEFAULT_SERVER_INDEX=1

# 映射配置
DEFAULT_REMOTE_PORTS="5173"
AUTO_OPEN_BROWSER=true
ENABLE_MINI_GAME=true
AUTO_RECONNECT=true
RECONNECT_MAX_RETRIES=5
RECONNECT_BACKOFF_SEC=3

# 危险端口列表 (SSH, MySQL, Redis, PostgreSQL, MongoDB, FTP, Telnet 等)
# 这些端口会被 map.sh 拦截，防止误映射高风险服务
FORBIDDEN_PORTS=(22 3306 6379 5432 27017 21 23)
