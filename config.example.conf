# 服务器连接配置
# 复制本文件为 config.conf 后，按实际信息修改
REMOTE_USER="your_user"
REMOTE_HOST="example.com"
REMOTE_SSH_PORT=22
SSH_PASSWORD="your_password"

# 映射配置
DEFAULT_REMOTE_PORTS="5173"
AUTO_OPEN_BROWSER=true
ENABLE_MINI_GAME=true

# 危险端口列表 (SSH, MySQL, Redis, PostgreSQL, MongoDB, FTP, Telnet 等)
# 这些端口会被 map.sh 拦截，防止误映射高风险服务
FORBIDDEN_PORTS=(22 3306 6379 5432 27017 21 23)
